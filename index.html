<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Datos del proveedor</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="formulario">

    <div class="titulo">
        Datos del proveedor
    </div>

    <div class="contenido">

        <form>

            <label>Nombre</label>
            <input type="text" placeholder="Ingrese su nombre">

            <label>Dirección</label>
            <textarea rows="4" placeholder="Ingrese su dirección"></textarea>

            <div class="fila">

                <div class="columna">

                    <label>Teléfono residencial</label>
                    <input type="text" placeholder="Teléfono residencial">

                </div>

                <div class="columna">

                    <label>Celular</label>
                    <input type="text" placeholder="Teléfono celular">

                </div>

            </div>

            <label>Email</label>
            <input type="email" placeholder="Correo electrónico">

            <button type="submit">
                Guardar
            </button>

        </form>

    </div>

</div>

</body>
</html>
